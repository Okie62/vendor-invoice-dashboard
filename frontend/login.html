<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Invoice Dashboard — Login</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #21252f; --border: #2a2e3a;
    --text: #e4e6eb; --text-dim: #8b8f9a; --text-bright: #ffffff;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --green: #22c55e; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
  .login-card h1 { font-size: 24px; color: var(--text-bright); text-align: center; margin-bottom: 4px; }
  .login-card .subtitle { color: var(--text-dim); font-size: 14px; text-align: center; margin-bottom: 32px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 12px 14px; background: #15171f; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
  .form-group input:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #353a48; }
  .error-msg { color: var(--red); font-size: 13px; text-align: center; margin-top: 16px; min-height: 18px; }
  .toggle-text { text-align: center; color: var(--text-dim); font-size: 13px; margin-top: 20px; }
  .toggle-text a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .toggle-text a:hover { text-decoration: underline; }
  .badge { display: inline-block; background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 4px 14px; border-radius: 6px; font-weight: 600; font-size: 13px; color: white; margin-bottom: 16px; }
  .header { text-align: center; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="header">
    <div class="badge">OTS</div>
    <h1 id="formTitle">Sign In</h1>
    <div class="subtitle">Vendor Invoice Dashboard · Oklahoma Technology Solutions</div>
  </div>

  <form id="authForm">
    <div id="nameField" class="form-group" style="display:none">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="Jay Wade">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@oktechsol.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
  </form>

  <div class="error-msg" id="errorMsg"></div>

  <div class="toggle-text" id="toggleText">
    Don't have an account? <a id="toggleLink">Register</a>
  </div>
</div>

<script>
let isRegisterMode = false;

// Check if any users exist — if not, force register mode
async function checkSetup() {
  try {
    const res = await fetch('/api/auth/setup-check');
    const data = await res.json();
    if (!data.has_users) {
      // No users yet — switch to register mode
      isRegisterMode = true;
      updateMode();
      document.getElementById('toggleText').style.display = 'none';
    }
  } catch(e) {
    // If setup-check fails, default to login
  }
}

function updateMode() {
  const nameField = document.getElementById('nameField');
  const formTitle = document.getElementById('formTitle');
  const submitBtn = document.getElementById('submitBtn');
  const toggleLink = document.getElementById('toggleLink');
  const toggleText = document.getElementById('toggleText');

  if (isRegisterMode) {
    nameField.style.display = 'block';
    formTitle.textContent = 'Create Account';
    submitBtn.textContent = 'Register';
    toggleLink.textContent = 'Sign In';
    toggleText.innerHTML = 'Already have an account? <a id="toggleLink">Sign In</a>';
  } else {
    nameField.style.display = 'none';
    formTitle.textContent = 'Sign In';
    submitBtn.textContent = 'Sign In';
    toggleText.innerHTML = "Don't have an account? <a id=\"toggleLink\">Register</a>";
  }
  // Re-bind toggle link
  document.getElementById('toggleLink').addEventListener('click', (e) => {
    e.preventDefault();
    isRegisterMode = !isRegisterMode;
    updateMode();
    document.getElementById('errorMsg').textContent = '';
  });
}

document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const fullName = document.getElementById('fullName').value.trim();

  errorMsg.textContent = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Please wait...';

  const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
  const body = isRegisterMode
    ? { email, password, full_name: fullName }
    : { email, password };

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (res.ok) {
      // Store tokens
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      // Redirect to dashboard
      window.location.href = '/';
    } else {
      errorMsg.textContent = data.error || 'Something went wrong';
    }
  } catch(err) {
    errorMsg.textContent = 'Network error — please try again';
  }

  submitBtn.disabled = false;
  updateMode();
});

checkSetup();
updateMode();
</script>
</body>
</html>
